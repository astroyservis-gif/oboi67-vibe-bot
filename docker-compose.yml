version: '3.8'

services:
  # Фронтенд (React/Vite + Nginx)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    # Заставляем web запускаться всегда (даже если бот упал)

  # Бэкэнд (Python Telegram Bot)
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    # Подтягиваем секреты и токены из .env файла
    env_file:
      - .env
    restart: unless-stopped
